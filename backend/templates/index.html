<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Resume Analyzer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
}

/* TITLE */
h1 {
    text-align: center;
    margin-bottom: 30px;
    font-size: 34px;

    background: linear-gradient(90deg, #38bdf8, #6366f1);
    background-clip: text;
    -webkit-background-clip: text;

    color: transparent;
    -webkit-text-fill-color: transparent;
}

/* LAYOUT */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 30px;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(14px);
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 20px;
    box-shadow: 0 0 30px rgba(56,189,248,0.12);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-4px);
}

/* INPUT */
input, textarea {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    background: #1e293b;
    color: white;
}

/* BUTTON */
button {
    margin-top: 15px;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 12px;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    color: white;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 15px #38bdf8;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
}

.box {
    background: rgba(255,255,255,0.06);
    padding: 15px;
    border-radius: 12px;
}

/* SCORE */
.circle-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    margin: auto;
}

.circle {
    transform: rotate(-90deg);
}

.bg {
    fill: none;
    stroke: #1e293b;
    stroke-width: 10;
}

.progress {
    fill: none;
    stroke: url(#grad);
    stroke-width: 10;
    stroke-dasharray: 377;
    stroke-dashoffset: 377;
    transition: stroke-dashoffset 1s ease;
}

.inside-circle {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 28px;
    font-weight: bold;
    color: #38bdf8;
}

/* SKILLS */
.skill-item {
    margin: 10px 0;
}

.bar {
    height: 6px;
    background: #1e293b;
    border-radius: 5px;
    margin-top: 5px;
}

.fill {
    height: 6px;
    border-radius: 5px;
    background: linear-gradient(90deg,#38bdf8,#6366f1);
    transition: width 0.6s ease;
}

/* RADAR */
#radarChart {
    height: 300px !important;
}

/* LOADER (smooth fade) */
#loader {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: 0.3s;
}

#loader.active {
    opacity: 1;
    pointer-events: all;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 6px solid #1e293b;
    border-top: 6px solid #38bdf8;
    border-radius: 50%;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    100% {transform: rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<h1>AI Resume Analyzer</h1>

<div class="card">
    <input type="file" id="resume">
    <textarea id="job_desc" rows="5" placeholder="Paste Job Description..."></textarea>
    <button onclick="analyzeResume()">Analyze Resume</button>
</div>

<div class="card">
    <div class="circle-wrap">
        <svg class="circle" width="160" height="160">
            <defs>
                <linearGradient id="grad">
                    <stop offset="0%" stop-color="#38bdf8"/>
                    <stop offset="100%" stop-color="#6366f1"/>
                </linearGradient>
            </defs>
            <circle cx="80" cy="80" r="60" class="bg"></circle>
            <circle cx="80" cy="80" r="60" class="progress" id="progressCircle"></circle>
        </svg>
        <div class="inside-circle">
            <span id="score">0</span>%
        </div>
    </div>
</div>

<div class="grid">
    <div class="box">
        <h3>Matched Skills</h3>
        <div id="matched"></div>
    </div>

    <div class="box">
        <h3>Missing Skills</h3>
        <div id="missing"></div>
    </div>

    <div class="box" style="grid-column: span 2;">
        <h3>Feedback</h3>
        <div id="feedback"></div>
    </div>
</div>

<div class="card">
    <h3>Skill Comparison</h3>
    <canvas id="radarChart"></canvas>
</div>

<div class="card">
    <button onclick="downloadReport()">Download Report</button>
    <button onclick="copyResults()" style="background: linear-gradient(90deg, #34d399, #10b981);">Copy Results</button>
</div>

</div>

<div id="loader">
    <div class="spinner"></div>
</div>

<script>

function showLoader(show) {
    const loader = document.getElementById("loader");
    loader.classList.toggle("active", show);
}

function renderSkills(skills, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = "";

    if (!skills.length) {
        container.innerHTML = "<small>None</small>";
        return;
    }

    skills.forEach((skill, i) => {
        const width = 70 + (i % 3) * 10; // consistent, not random
        container.innerHTML += `
            <div class="skill-item">
                <small>${skill}</small>
                <div class="bar">
                    <div class="fill" style="width:${width}%"></div>
                </div>
            </div>
        `;
    });
}

async function analyzeResume() {

    let file = document.getElementById("resume").files[0];
    let job_desc = document.getElementById("job_desc").value;

    if (!file) return alert("Upload resume");
    if (!job_desc.trim()) return alert("Enter job description");

    let formData = new FormData();
    formData.append("resume", file);
    formData.append("job_desc", job_desc);

    showLoader(true);

    let response = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    let data = await response.json();

    showLoader(false);

    let score = data.score || 0;

    document.getElementById("score").innerText = score;

    document.getElementById("progressCircle")
        .style.strokeDashoffset = 377 - (377 * score) / 100;

    renderSkills(data.matched_skills || [], "matched");
    renderSkills(data.missing_skills || [], "missing");

    document.getElementById("feedback").innerText = data.feedback || "--";

    if (data.chart && data.chart.labels.length) {

        const ctx = document.getElementById("radarChart").getContext("2d");

        if (window.chart) window.chart.destroy();

        window.chart = new Chart(ctx, {
            type: "radar",
            data: {
                labels: data.chart.labels,
                datasets: [
                    {
                        label: "Resume",
                        data: data.chart.resume,
                        borderColor: "#38bdf8",
                        backgroundColor: "rgba(56,189,248,0.2)"
                    },
                    {
                        label: "Job",
                        data: data.chart.job,
                        borderColor: "#ef4444",
                        backgroundColor: "rgba(239,68,68,0.2)"
                    }
                ]
            },
            options: {
                plugins: {
                    legend: { labels: { color: "white" } }
                },
                scales: {
                    r: {
                        suggestedMin: 0,
                        suggestedMax: 1,
                        grid: { color: "rgba(255,255,255,0.1)" },
                        pointLabels: { color: "#cbd5f5" }
                    }
                }
            }
        });
    }
}

async function downloadReport() {

    let score = document.getElementById("score").innerText;

    let matched = [...document.querySelectorAll("#matched small")].map(e => e.innerText);
    let missing = [...document.querySelectorAll("#missing small")].map(e => e.innerText);
    let feedback = document.getElementById("feedback").innerText;

    let response = await fetch("/download-report", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ score, matched_skills: matched, missing_skills: missing, feedback })
    });

    let blob = await response.blob();
    let link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "AI_Resume_Report.pdf";
    link.click();
}

async function copyResults() {
    let score = document.getElementById("score").innerText;
    let matched = [...document.querySelectorAll("#matched small")].map(e => e.innerText);
    let missing = [...document.querySelectorAll("#missing small")].map(e => e.innerText);
    let feedback = document.getElementById("feedback").innerText;

    let text = `Score: ${score}%\nMatched Skills: ${matched.length ? matched.join(", ") : "None"}\nMissing Skills: ${missing.length ? missing.join(", ") : "None"}\nFeedback: ${feedback}`;

    try {
        await navigator.clipboard.writeText(text);
        alert("Analysis results copied to clipboard.");
    } catch (error) {
        let textarea = document.createElement("textarea");
        textarea.value = text;
        document.body.appendChild(textarea);
        textarea.select();
        document.execCommand("copy");
        document.body.removeChild(textarea);
        alert("Analysis results copied to clipboard.");
    }
}

</script>

</body>
</html>
